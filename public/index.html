<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOC Dashboard - Monitoreo de Enlaces</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap');
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #050811;
        }
        .title-font {
            font-family: 'Orbitron', sans-serif;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #050811; }
        ::-webkit-scrollbar-thumb { background: #14b8a6; border-radius: 3px; }

</head>
<body class="text-slate-300 min-h-screen flex flex-col bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-purple-950/20 to-black">

    <header class="border-b border-cyan-500/20 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50 px-4 py-3 shadow-[0_4px_30px_rgba(0,255,255,0.05)]">
        <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="relative flex h-3 w-3">
                    <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                    <span class="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
                </div>
                <h1 class="title-font text-xl md:text-2xl font-bold tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-teal-400 to-emerald-400 uppercase">
                    NOC GLOBAL - DISTRICT 07D06
                </h1>
            </div>
            
            <div class="flex items-center gap-4 text-xs font-mono bg-slate-900/90 px-3 py-1.5 rounded border border-slate-800">
                <div>DISPOSITIVO: <span id="device-badge" class="text-cyan-400 font-bold">DETECTANDO...</span></div>
                <div class="hidden sm:block text-slate-600">|</div>
                <div>TOTAL ENLACES: <span id="total-badge" class="text-teal-400 font-bold">0</span></div>

        </div>
    </header>

    <main class="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6">
        
        <div class="mb-6 flex flex-col sm:flex-row gap-4 justify-between items-stretch sm:items-center bg-slate-950/40 p-4 rounded-xl border border-slate-800 backdrop-blur-sm">
            <div class="relative flex-1 max-w-md">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-500">
                    <i class="fa-solid fa-microchip animate-pulse text-cyan-500"></i>
                </span>
                <input type="text" id="search-input" placeholder="BUSCAR POR INSTITUCIÓN, AMIE, IP O ID..." 
                    class="w-full bg-black/60 border border-slate-700 rounded-lg pl-10 pr-4 py-2 text-sm font-mono tracking-wider focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 transition-all text-cyan-300 placeholder-slate-600 uppercase">
            </div>
            <div class="flex items-center justify-between sm:justify-end gap-3">
                <span class="text-xs text-slate-400 uppercase tracking-widest">Vista Aplicada:</span>
                <span id="view-mode-indicator" class="px-3 py-1 bg-purple-950/50 border border-purple-500/30 text-purple-400 text-xs font-bold rounded tracking-wider">
                    -
                </span>
            </div>
        </div>

        <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <div id="pagination-controls" class="hidden mt-8 flex justify-center items-center gap-4">
            <button id="prev-btn" class="px-4 py-2 bg-slate-900 hover:bg-cyan-950 border border-slate-800 hover:border-cyan-500/50 rounded-lg text-cyan-400 font-bold text-xs tracking-widest disabled:opacity-30 disabled:pointer-events-none transition-all duration-300 uppercase">
                <i class="fa-solid fa-backward-step mr-2"></i> ANTERIOR
            </button>
            <span class="text-xs tracking-widest text-slate-400 font-mono">
                PÁGINA <span id="current-page" class="text-cyan-400 font-bold">1</span> DE <span id="total-pages" class="text-slate-400">1</span>
            </span>
            <button id="next-btn" class="px-4 py-2 bg-slate-900 hover:bg-cyan-950 border border-slate-800 hover:border-cyan-500/50 rounded-lg text-cyan-400 font-bold text-xs tracking-widest disabled:opacity-30 disabled:pointer-events-none transition-all duration-300 uppercase">
                SIGUIENTE <i class="fa-solid fa-forward-step ml-2"></i>
            </button>
        </div>
    </main>

    <footer class="border-t border-slate-900 bg-black/80 px-4 py-3 mt-12 text-center text-[11px] font-mono tracking-widest text-slate-500">
        SYSTEM CLOUD GATEWAY: <span class="text-emerald-500 font-bold">ACTIVE</span> // CACTI INTEGRATION ENGINE v1.2.5 // FASTBOY NETWORKS
    </footer>

    <script>

", "piloto": "754400", "velocidad": "40MB", "ip": "181.196.62.246", "graph_id": "71237"}, {"amie": "07H01099", "name": "UE PROF. FABIÁN ESPINOZA SÁNCHEZ", "piloto": "420391", "velocidad": "40MB", "ip": "181.112.190.14", "graph_id": "48263"}, {"amie": "07H01100", "name": "UE ABDÓN CALDERÓN MUÑOZ", "piloto": "431660", "velocidad": "50MB", "ip": "181.112.190.13", "graph_id": "59862"}, {"amie": "07H01105", "name": "UE GUILLERMINA UNDA DE GARCIA", "piloto": "589016", "velocidad": "40MB", "ip": "131.196.12.147", "graph_id": "67407"}, {"amie": "07H01106", "name": "UE DEMETRIO AGUILERA MALTA", "piloto": "760864", "velocidad": "2F 55X25 MB", "ip": "181.196.59.186", "graph_id": "48567"}, {"amie": "07H01109", "name": "CEI 15 DE OCTUBRE", "piloto": "589013", "velocidad": "40MB", "ip": "186.46.7.178", "graph_id": "71244"}, {"amie": "07H01110", "name": "UE ALEJANDRO AGUILAR LOZANO", "piloto": "558876", "velocidad": "40MB", "ip": "190.11.26.70", "graph_id": "60840"}, {"amie": "07H01112", "name": "UE ROSA AURORA GARCIA", "piloto": "2129395", "velocidad": "40MB", "ip": "186.46.94.162", "graph_id": "67404"}, {"amie": "07H01121", "name": "UE JULIO LORENZO BETANCOURT CAILLAGUA", "piloto": "21112", "velocidad": "40MB", "ip": "186.46.7.74", "graph_id": "71319"}, {"amie": "07H01125", "name": "UE ORIENTE ECUATORIANO", "piloto": "2645537", "solar_id": "Varios", "velocidad": "50MB", "ip": "181.211.244.21", "graph_id": "60805"}, {"amie": "07H01126", "name": "UE DR. NAPOLEON MERA", "piloto": "2074510", "velocidad": "40MB", "ip": "181.113.7.206", "graph_id": "56171"}, {"amie": "07H01139", "name": "UE JOSE ANTONIO JARA", "piloto": "54839", "velocidad": "40MB", "ip": "181.196.150.24", "graph_id": "65423"}, {"amie": "07H01141", "name": "UE 13 DE ABRIL", "piloto": "2407473", "velocidad": "40MB", "ip": "181.196.147.2", "graph_id": "65424"}, {"amie": "07H01147", "name": "UE CARLOS ZAMBRANO OREJUELA", "piloto": "2552736", "velocidad": "50MB", "ip": "181.211.244.15", "graph_id": "21596"}, {"amie": "07H01151", "name": "UE DR. MODESTO CHÁVEZ FRANCO", "piloto": "251577", "velocidad": "40MB", "ip": "190.214.50.10", "graph_id": "67559"}, {"amie": "07H01153", "name": "EEB EMILIANO VALVERDE", "piloto": "17885", "velocidad": "40MB", "ip": "186.42.171.10", "graph_id": "57015"}, {"amie": "07H01154", "name": "UE LCDO. FAUSTO MOLINA MOLINA", "piloto": "500077", "velocidad": "40MB", "ip": "186.46.128.122", "graph_id": "61642"}, {"amie": "07H01169", "name": "UE ROSA DE LUXEMBURGO", "piloto": "2645536", "velocidad": "50MB", "ip": "190.214.13.114", "graph_id": "56997"}, {"amie": "07H01304", "name": "UE WALTER LAINEZ MARTÍNEZ", "piloto": "433758", "velocidad": "40MB", "ip": "181.112.190.21", "graph_id": "59592"}, {"amie": "07H01550", "name": "CONSERVATORIO MARÍA DE JESÚS FLORES MENDOZA", "piloto": "2465522", "velocidad": "40MB", "ip": "186.46.237.106", "graph_id": "71236"}];

        let filteredData = [...dataset];
        let currentPage = 1;
        const itemsPerPageMobile = 5;
        let isMobile = false;

        const gridContainer = document.getElementById('grid-container');
        const searchInput = document.getElementById('search-input');
        const deviceBadge = document.getElementById('device-badge');
        const totalBadge = document.getElementById('total-badge');
        const viewModeIndicator = document.getElementById('view-mode-indicator');
        const paginationControls = document.getElementById('pagination-controls');
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');
        const currentPageSpan = document.getElementById('current-page');
        const totalPagesSpan = document.getElementById('total-pages');

        function checkViewport() {
            const width = window.innerWidth;
            const previousMode = isMobile;
            isMobile = width < 768;
            
            if(isMobile) {
                deviceBadge.innerHTML = '<i class="fa-solid fa-mobile-screen mr-1 text-purple-400"></i> CELULAR';
                viewModeIndicator.textContent = 'PAGINADO (MAX 5)';
                viewModeIndicator.className = "px-3 py-1 bg-purple-950/50 border border-purple-500/40 text-purple-400 text-xs font-bold rounded tracking-wider shadow-[0_0_10px_rgba(168,85,247,0.1)]";
                paginationControls.classList.remove('hidden');
            } else {
                deviceBadge.innerHTML = '<i class="fa-solid fa-desktop mr-1 text-cyan-400"></i> COMPUTADORA';
                viewModeIndicator.textContent = 'PANORÁMICO (TODOS)';
                viewModeIndicator.className = "px-3 py-1 bg-cyan-950/50 border border-cyan-500/40 text-cyan-400 text-xs font-bold rounded tracking-wider shadow-[0_0_10px_rgba(6,182,212,0.1)]";
                paginationControls.classList.add('hidden');
            }

            if (previousMode !== isMobile) {
                currentPage = 1;
                renderDashboard();
            }
        }

        function renderDashboard() {
            gridContainer.innerHTML = '';
            totalBadge.textContent = filteredData.length;

            if (filteredData.length === 0) {
                gridContainer.innerHTML = `
                    <div class="col-span-full text-center py-12 border border-dashed border-red-500/20 bg-red-950/10 rounded-xl p-8">
                        <i class="fa-solid fa-triangle-exclamation text-red-500 text-3xl mb-3 animate-bounce"></i>
                        <p class="text-red-400 font-bold tracking-widest text-sm uppercase">Sin registros coincidentes en la matriz</p>
                    </div>`;
                return;
            }

            let dataToRender = filteredData;
            
            if (isMobile) {
                const totalPages = Math.ceil(filteredData.length / itemsPerPageMobile);
                totalPagesSpan.textContent = totalPages;
                currentPageSpan.textContent = currentPage;

                if (currentPage > totalPages) currentPage = totalPages || 1;
                
                const startIndex = (currentPage - 1) * itemsPerPageMobile;
                dataToRender = filteredData.slice(startIndex, startIndex + itemsPerPageMobile);

                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;
            }

            dataToRender.forEach((item) => {
                const mockIsOnline = (parseInt(item.graph_id) % 9 !== 0); 
                const mockLatency = mockIsOnline ? Math.floor(12 + (parseInt(item.graph_id) % 28)) + " ms" : "—";
                const statusColorClass = mockIsOnline ? "emerald" : "red";
                const statusLabel = mockIsOnline ? "ONLINE" : "OFFLINE";

                const cardHtml = `
                    <div class="bg-slate-950/80 border border-${statusColorClass}-500/20 rounded-xl p-4 shadow-[0_0_20px_rgba(0,0,0,0.5)] hover:shadow-[0_0_25px_rgba(${mockIsOnline ? '16,185,129' : '239,68,68'},0.15)] transition-all duration-300 relative overflow-hidden flex flex-col justify-between group">
                        <div class="absolute inset-0 bg-gradient-to-b from-transparent via-${statusColorClass}-500/5 to-transparent opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity duration-700 animate-pulse"></div>
                        <div>
                            <div class="flex justify-between items-start mb-3 border-b border-slate-900 pb-2">
                                <div class="max-w-[65%]">
                                    <h3 class="text-slate-200 font-bold text-sm tracking-wider uppercase truncate title-font group-hover:text-${statusColorClass}-400 transition-colors" title="${item.name}">
                                        ${item.name}
                                    </h3>
                                    <p class="text-[11px] text-slate-500 font-mono mt-0.5">AMIE: <span class="text-cyan-400">${item.amie}</span></p>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-0.5 bg-slate-900 border border-slate-800 text-[9px] text-slate-400 font-bold rounded tracking-wider block mb-1">
                                        BW: ${item.velocidad}
                                    </span>
                                    <span class="px-2 py-0.5 bg-purple-950/40 border border-purple-500/30 text-[9px] text-purple-400 font-bold rounded tracking-widest block">
                                        PILOTO: ${item.piloto}
                                    </span>
                                </div>
                            </div>

                            <div class="text-[11px] font-mono mb-2 px-2 py-1 bg-slate-900/80 rounded border border-slate-800/60 flex justify-between items-center">
                                <span class="text-slate-500">IP PÚBLICA:</span>
                                <span class="text-cyan-400 font-bold tracking-widest">${item.ip}</span>
                            </div>

                            <div class="flex items-center justify-between bg-black/40 p-2 rounded-lg border border-slate-900 mb-3">
                                <div class="flex items-center gap-2">
                                    <span class="relative flex h-2.5 w-2.5">
                                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-${statusColorClass}-400 opacity-75"></span>
                                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-${statusColorClass}-500"></span>
                                    </span>
                                    <span class="text-${statusColorClass}-400 font-bold text-xs tracking-widest">${statusLabel}</span>
                                </div>
                                <div class="text-right flex items-center gap-2">
                                    <span class="text-[10px] text-slate-600 block tracking-widest">LATENCIA:</span>
                                    <span class="text-${statusColorClass}-400 font-bold text-xs font-mono">${mockLatency}</span>
                                </div>
                            </div>
                        </div>

                        <div class="mt-auto pt-2 border-t border-slate-900/50">
                            <div class="text-[9px] text-slate-600 mb-1 flex justify-between tracking-widest">
                                <span>CACTI LIVE TRAFFIC DATA</span>
                                <span class="text-slate-500">G-ID: ${item.graph_id}</span>
                            </div>
                            <div class="border border-slate-900 bg-black/90 rounded-lg overflow-hidden p-1 relative min-h-[110px] flex items-center justify-center">
                                <img src="/api/cacti-graph?graph_id=${item.graph_id}" 
                                     alt="Telemetría Cacti" 
                                     class="w-full h-auto object-cover opacity-85 group-hover:opacity-100 transition-opacity duration-300"
                                     onerror="this.onerror=null; this.src='https://placehold.co/400x160/020617/14b8a6?text=ID+${item.graph_id}+-+Cacti+Live';">
                            </div>
                        </div>
                    </div>
                `;
                gridContainer.insertAdjacentHTML('beforeend', cardHtml);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            filteredData = dataset.filter(item => 
                item.name.toLowerCase().includes(query) || 
                item.amie.toLowerCase().includes(query) ||
                item.ip.includes(query) ||
                item.graph_id.includes(query) ||
                item.piloto.includes(query)
            );
            currentPage = 1;
            renderDashboard();
        });

        prevBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderDashboard();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        nextBtn.addEventListener('click', () => {
            const totalPages = Math.ceil(filteredData.length / itemsPerPageMobile);
            if (currentPage < totalPages) {
                currentPage++;
                renderDashboard();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        window.addEventListener('resize', checkViewport);
        checkViewport();
        renderDashboard();
    </script>
</body>
</html>
